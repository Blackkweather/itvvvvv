version: '3.8'

services:
  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://streampro:streampro@db:5432/streampro
      # IMPORTANT: In production, use a secure 64+ character JWT secret via secrets
      - JWT_SECRET=dev_jwt_secret_key_64_chars_minimum_for_development_only_change_me
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: npm run dev

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=streampro
      - POSTGRES_PASSWORD=streampro
      - POSTGRES_DB=streampro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streampro"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for rate limiting (optional - for production)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: