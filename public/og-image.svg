<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020205"/>
      <stop offset="50%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#020205"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="200" fill="rgba(212,175,55,0.1)"/>
  <circle cx="1000" cy="480" r="180" fill="rgba(139,92,246,0.1)"/>
  
  <!-- Main text -->
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white" letter-spacing="8">STREAM</text>
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="rgba(255,255,255,0.2)" letter-spacing="8">PRO</text>
  
  <!-- Tagline -->
  <text x="600" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.6)" letter-spacing="4">PREMIUM IPTV SERVICE</text>
  
  <!-- Divider -->
  <rect x="400" y="480" width="400" height="2" fill="url(#gold)"/>
  
  <!-- Features -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#D4AF37" letter-spacing="2">15,000+ CHANNELS • 4K • 24/7 SUPPORT</text>
  
  <!-- Website URL -->
  <text x="600" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">streampro.space</text>
</svg>